<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Charms</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { 
        background: linear-gradient(135deg, #fff1f7 0%, #f8e8f0 100%); 
        font-family: Arial; 
        color: #333;
    }

    /* YOUR EXACT NAV STYLES */
    .cart-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 22px 20px;
        background: white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .left-nav { display: flex; align-items: center; }
    .back-link { display: flex; align-items: center; text-decoration: none; }
    .icon { width: 30px; height: 30px; }
    .home-text {
        margin-left: 8px;
        font-size: 25px;
        color: #3d0026;
        font-family: "Times new roman";
        font-weight: bold;
    }
    .home-text:hover { color: #d63384; }
    .center-nav { flex: 1; text-align: center; }
    .cart-title {
        font-size: 25px;
        margin: 0;
        font-weight: 600;
        font-family: "Times new roman";
    }

    /* CART CONTENT - MINIMAL CHANGES */
    .cart-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .cart-header {
        text-align: center;
        margin-bottom: 40px;
    }
    .cart-count {
        font-size: 20px;
        color: #666;
        font-family: "Times New Roman";
    }
    .cart-item {
        display: flex;
        align-items: center;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        transition: 0.3s;
    }
    .cart-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .cart-item img {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border-radius: 10px;
        margin-right: 25px;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name {
        font-size: 20px;
        font-family: "Times New Roman";
        color: #3d0026;
        margin-bottom: 8px;
    }
    .cart-item-price {
        font-size: 22px;
        color: #d63384;
        font-weight: bold;
        font-family: "Times New Roman";
    }

    /* SMALL QUANTITY BUTTONS - SAME DESIGN AS REMOVE */
    .quantity-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
    }
    .qty-btn {
        background: #3d0026;
        color: white;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 20px;
        cursor: pointer;
        font-family: "Times New Roman";
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }
    .qty-btn:hover:not(:disabled) { 
        background: #b62a70;
        transform: scale(1.05);
    }
    .qty-btn:disabled { 
        background: #ccc;
        cursor: not-allowed;
    }
    .qty-display {
        font-size: 18px;
        font-weight: bold;
        color: #3d0026;
        font-family: "Times New Roman";
        min-width: 25px;
        text-align: center;
    }

    .remove-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 25px;
        cursor: pointer;
        font-family: "Times New Roman";
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
        margin-left: 20px;
    }
    .remove-btn:hover { background: #c82333; }

    .empty-cart {
        text-align: center;
        padding: 80px 20px;
    }
    .empty-text {
        font-size: 24px;
        color: #666;
        font-family: "Times New Roman";
        margin-bottom: 20px;
    }
    .total-section {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        margin-top: 40px;
        text-align: center;
    }
    .total-price {
        font-size: 32px;
        color: #3d0026;
        font-weight: bold;
        font-family: "Times New Roman";
        margin-bottom: 25px;
    }
    .checkout-btn {
        background: #3d0026;
        color: white;
        border: none;
        padding: 18px 50px;
        border-radius: 30px;
        font-size: 20px;
        font-family: "Times New Roman";
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }
    .checkout-btn:hover { background: #b62a70; transform: translateY(-2px); }

    @media (max-width: 768px) {
        .cart-nav {
            padding: 12px 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .icon {
            width: 26px;
            height: 26px;
        }

        .home-text {
            margin-left: 6px;
            font-size: 16px;
        }

        .cart-title {
            font-size: 16px;
        }

        .cart-container {
            margin: 20px auto;
            padding: 0 12px;
        }

        .cart-header {
            margin-bottom: 20px;
        }

        .cart-count {
            font-size: 14px;
        }

        .cart-item {
            flex-direction: column;
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .cart-item img {
            width: 70px;
            height: 70px;
            margin-right: 0;
            margin-bottom: 12px;
            border-radius: 8px;
        }

        .cart-item-name {
            font-size: 14px;
            margin-bottom: 6px;
        }

        .cart-item-price {
            font-size: 16px;
        }

        .quantity-controls {
            gap: 6px;
            margin: 8px 0;
            justify-content: center;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            font-size: 14px;
        }

        .qty-display {
            font-size: 14px;
            min-width: 20px;
        }

        .remove-btn {
            margin-left: 0;
            margin-top: 10px;
            padding: 10px 16px;
            font-size: 12px;
            width: 100%;
        }

        .empty-cart {
            padding: 40px 15px;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .total-section {
            padding: 20px;
            margin-top: 25px;
        }

        .total-price {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .checkout-btn {
            padding: 14px 25px;
            font-size: 14px;
        }
    }

    @media (max-width: 600px) {
        .cart-nav {
            padding: 10px 8px;
        }

        .home-text {
            font-size: 14px;
        }

        .cart-title {
            font-size: 14px;
        }

        .cart-container {
            padding: 0 10px;
        }

        .cart-item {
            padding: 12px;
            margin-bottom: 12px;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
        }

        .cart-item-name {
            font-size: 12px;
        }

        .cart-item-price {
            font-size: 14px;
        }

        .quantity-controls {
            gap: 5px;
            margin: 6px 0;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            font-size: 12px;
        }

        .qty-display {
            font-size: 12px;
        }

        .remove-btn {
            padding: 8px 12px;
            font-size: 11px;
        }

        .empty-text {
            font-size: 14px;
        }

        .total-price {
            font-size: 20px;
        }

        .checkout-btn {
            padding: 12px 20px;
            font-size: 12px;
        }
    }

    @media (max-width: 480px) {
        .cart-count {
            font-size: 12px;
        }

        .cart-item-name {
            font-size: 11px;
        }

        .cart-item-price {
            font-size: 12px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            font-size: 11px;
        }

        .total-price {
            font-size: 18px;
        }
    }
</style>

</head>
<body>

    <nav class="cart-nav">
        <div class="left-nav">
            <a href="index.html" class="back-link">
                <img src="back.png" alt="Back" class="icon">
                <span class="home-text">Home</span>
            </a>
        </div>

        <div class="center-nav">
            <h2 class="cart-title">Favorites / Added to Cart</h2>
        </div>
    </nav>

    <div class="cart-container">
        <div class="cart-header">
            <div id="cartCount" class="cart-count">0 items in cart</div>
        </div>

        <div id="cartItems"></div>
        
        <div id="emptyCart" class="empty-cart" style="display: none;">
            <div class="empty-text">No items added to cart yet</div>
            <div style="font-size: 18px; color: #999;">
                Click the <span style="color: #3d0026; font-size: 24px;">♥</span> on products to add them here
            </div>
        </div>

        <div id="cartTotal" class="total-section" style="display: none;">
            <div id="totalPrice" class="total-price">₱0.00</div>
            <button class="checkout-btn" onclick="proceedToCheckout()">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", function() {
    // Check if user is logged in
    const userLogin = JSON.parse(localStorage.getItem("userLogin"));
    if (!userLogin) {
        // Redirect to login if not logged in
        alert("Please log in to view your cart.");
        window.location.href = "login.html";
        return;
    }

    // Clear any direct checkout product when viewing cart
    localStorage.removeItem("directCheckoutProduct");

    const userId = userLogin.userId;
    const cartKey = `cart_${userId}`;
    
    // 🔥 USER-SPECIFIC CART
    let cart = [];
    
    function loadCart() {
        try {
            const saved = localStorage.getItem(cartKey);
            cart = saved ? JSON.parse(saved) : [];
            console.log("Cart loaded for user", userId, ":", cart);
        } catch (e) {
            console.error("Cart load error:", e);
            cart = [];
            localStorage.removeItem(cartKey);
        }
    }
    
    function saveCart() {
        try {
            localStorage.setItem(cartKey, JSON.stringify(cart));
            console.log("Cart saved for user", userId, ":", cart);
        } catch (e) {
            console.error("Cart save error:", e);
        }
    }
    
    loadCart(); // Initial load
    
    const cartItemsEl = document.getElementById("cartItems");
    const emptyCartEl = document.getElementById("emptyCart");
    const cartTotalEl = document.getElementById("cartTotal");
    const cartCountEl = document.getElementById("cartCount");
    const totalPriceEl = document.getElementById("totalPrice");

    const products = {
        "001": { name: "Pink & Pearl Bracelet", price: 75, image: "image2.jpg" },
        "002": { name: "Pink & Pearl Bracelet", price: 75, image: "image3.jpg" },
        "003": { name: "Blue & Pearl Bracelet", price: 75, image: "image4.jpg" },
        "004": { name: "Blue & Pearl Bracelet", price: 75, image: "image11.jpg" },
        "005": { name: "Blue & Pearl Bracelet", price: 75, image: "image10.jpg" },
        "006": { name: "Blue & Pearl Bracelet", price: 75, image: "image12.jpg" },
        "007": { name: "Blue & Pearl Bracelet", price: 75, image: "image13.jpg" },
        "008": { name: "Blue & Pearl Bracelet", price: 75, image: "image14.jpg" },
        "009": { name: "Blue & Pearl Bracelet", price: 75, image: "image15.jpg" },
        "010": { name: "Pink & Pearl Keychain", price: 75, image: "image16.jpg" },
        "011": { name: "Blue & Pearl Keychain", price: 75, image: "image17.jpg" },
        "012": { name: "Gold & Pearl Keychain", price: 75, image: "image18.jpg" },
        "013": { name: "Gold & Pearl Keychain", price: 75, image: "image19.jpg" }
    };

    function renderCart() {
        loadCart(); // Always fresh
        
        cartItemsEl.innerHTML = "";
        
        if (cart.length === 0) {
            emptyCartEl.style.display = "block";
            cartTotalEl.style.display = "none";
            cartCountEl.textContent = "0 items";
            return;
        }
        
        emptyCartEl.style.display = "none";
        let totalItems = 0;
        let totalPrice = 0;
        
        cart.forEach((itemData, index) => {
            const id = itemData.id;
            const qty = itemData.quantity || 1;
            
            if (products[id]) {
                const product = products[id];
                totalItems += qty;
                totalPrice += product.price * qty;
                
                const cartItem = document.createElement("div");
                cartItem.className = "cart-item";
                cartItem.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">₱${(product.price * qty).toLocaleString()}.00</div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity('${id}', -1)">−</button>
                            <span class="qty-display">${qty}</span>
                            <button class="qty-btn" onclick="updateQuantity('${id}', 1)">+</button>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart('${id}')">Remove</button>
                `;
                cartItemsEl.appendChild(cartItem);
            }
        });
        
        cartCountEl.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
        totalPriceEl.textContent = `₱${totalPrice.toLocaleString()}.00`;
        cartTotalEl.style.display = "block";
    }

    window.updateQuantity = function(id, change) {
        loadCart();
        cart = cart.map(item => {
            if (item.id === id) {
                const newQty = Math.max(1, (item.quantity || 1) + change);
                return { ...item, quantity: newQty };
            }
            return item;
        });
        saveCart();
        renderCart();
    };

    window.removeFromCart = function(id) {
        loadCart();
        cart = cart.filter(item => item.id !== id);
        saveCart();
        renderCart();
    };

    window.proceedToCheckout = function() {
        loadCart();
        if (cart.length > 0) {
            saveCart(); // FINAL SAVE
            // Set flag to indicate this is a cart checkout
            localStorage.setItem("checkoutFromCart", "true");
            window.location.href = "checkout.html";
        } else {
            alert("Cart is empty!");
        }
    };

    // 🔥 AUTO-RELOAD ON FOCUS (fixes refresh issues)
    window.addEventListener('focus', renderCart);
    
    renderCart();
});
</script>

</body>
</html>
