<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Charms</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
        background: linear-gradient(135deg, #fff1f7 0%, #f8e8f0 100%);
        font-family: Arial;
        color: #333;
    }

    .cart-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 22px 20px;
        background: white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .left-nav { display: flex; align-items: center; }
    .back-link { display: flex; align-items: center; text-decoration: none; }
    .icon { width: 30px; height: 30px; }
    .home-text {
        margin-left: 8px;
        font-size: 25px;
        color: #3d0026;
        font-family: "Times new roman";
        font-weight: bold;
    }
    .home-text:hover { color: #d63384; }
    .center-nav { flex: 1; text-align: center; }
    .cart-title {
        font-size: 25px;
        margin: 0;
        font-weight: 600;
        font-family: "Times new roman";
    }

    .checkout-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
    }
    .form-section {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        margin-bottom: 25px;
    }
    .section-title {
        font-size: 22px;
        color: #3d0026;
        font-family: "Times New Roman";
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #d63384;
    }
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        font-size: 16px;
        font-family: "Times New Roman";
        color: #3d0026;
        margin-bottom: 8px;
        font-weight: 500;
    }
    input, textarea, select {
        width: 100%;
        padding: 15px;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        font-size: 16px;
        font-family: "Times New Roman";
        transition: 0.3s;
    }
    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: #d63384;
        box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
    }
    input[readonly] {
        background: #f8f9fa;
        color: #3d0026;
        font-weight: 500;
        cursor: not-allowed;
        border-color: #d63384;
    }
    input[readonly]:focus {
        border-color: #d63384;
        box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
    }
    textarea { resize: vertical; min-height: 100px; }

    .order-summary {
        background: #f8f9fa;
        padding: 25px;
        border-radius: 12px;
        margin: 25px 0;
        border-left: 5px solid #d63384;
    }
    .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-family: "Times New Roman";
    }
    .checkout-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #e9ecef;
    }
    .checkout-item:last-child { border-bottom: none; }
    .item-name { font-weight: 500; }
    .item-price { font-weight: bold; color: #d63384; }
    .summary-item.total {
        font-size: 22px;
        font-weight: bold;
        color: #d63384;
        border-top: 2px solid #e9ecef;
        padding-top: 12px;
    }

    .submit-btn {
        background: #d63384;
        color: white;
        border: none;
        padding: 18px 40px;
        border-radius: 25px;
        font-size: 18px;
        font-family: "Times New Roman";
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
        margin-top: 20px;
    }
    .submit-btn:hover {
        background: #b62a70;
        transform: translateY(-2px);
    }
    .submit-btn:disabled {
        background: #e9ecef;
        color: #999;
        cursor: not-allowed;
        transform: none;
    }
    .success-message {
        text-align: center;
        padding: 50px;
        background: #d4edda;
        border-radius: 15px;
        border: 3px solid #c3e6cb;
        display: none;
    }
    .success-icon { font-size: 60px; color: #28a745; margin-bottom: 15px; }

    .quantity-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
        background: #3d0026;
        color: white;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 20px;
        cursor: pointer;
        font-family: "Times New Roman";
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }
    .qty-btn:hover {
        background: #b62a70 !important;
        transform: scale(1.05);
    }
    .qty-display {
        font-size: 18px;
        font-weight: bold;
        color: #3d0026;
        font-family: "Times New Roman";
        min-width: 25px;
        text-align: center;
    }

    @media (max-width: 768px) {
        .cart-nav {
            padding: 12px 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .icon {
            width: 26px;
            height: 26px;
        }

        .home-text {
            margin-left: 6px;
            font-size: 16px;
        }

        .cart-title {
            font-size: 16px;
        }

        .checkout-container {
            padding: 0 12px;
            margin: 15px auto;
        }

        .form-section {
            padding: 20px;
            margin-bottom: 18px;
            border-radius: 12px;
        }

        .section-title {
            font-size: 16px;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            font-size: 14px;
            margin-bottom: 6px;
        }

        input, textarea, select {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .summary-item, .checkout-item {
            flex-direction: column;
            gap: 4px;
            padding: 12px;
            font-size: 14px;
        }

        .order-summary {
            padding: 15px;
        }

        .submit-btn {
            padding: 14px 25px;
            font-size: 14px;
            margin-top: 15px;
        }

        .quantity-controls {
            gap: 6px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            font-size: 14px;
        }

        .qty-display {
            font-size: 14px;
        }
    }

    @media (max-width: 600px) {
        .cart-nav {
            padding: 10px 8px;
        }

        .home-text {
            font-size: 14px;
        }

        .cart-title {
            font-size: 13px;
        }

        .checkout-container {
            padding: 0 10px;
        }

        .form-section {
            padding: 14px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            font-size: 12px;
        }

        input, textarea, select {
            padding: 10px;
            font-size: 12px;
        }

        .summary-item, .checkout-item {
            gap: 3px;
            padding: 10px;
            font-size: 12px;
        }

        .order-summary {
            padding: 12px;
        }

        .submit-btn {
            padding: 12px 18px;
            font-size: 12px;
        }

        .qty-btn {
            width: 26px;
            height: 26px;
            font-size: 12px;
        }

        .qty-display {
            font-size: 12px;
        }
    }

    @media (max-width: 480px) {
        .section-title {
            font-size: 12px;
        }

        .summary-item {
            font-size: 11px;
        }

        .submit-btn {
            font-size: 11px;
            padding: 10px 15px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            font-size: 11px;
        }
    }
</style>

</head>
<body>

    <nav class="cart-nav">
        <div class="left-nav">
            <a href="index.html" class="back-link" id="backLink">
                <img src="back.png" alt="Back" class="icon">
                <span class="home-text">Home</span>
            </a>
        </div>
        <div class="center-nav">
            <h2 class="cart-title">Check-out</h2>
        </div>
    </nav>

    <div class="checkout-container">
        <form id="checkoutForm">
            <div class="form-section">
                <h3 class="section-title">Customer Information</h3>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="customerName" required readonly>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phoneNumber" placeholder="09xxxxxxxxx" required readonly>
                </div>
                <div class="form-group">
                    <label>Email (from your account)</label>
                    <input type="email" id="customerEmail" readonly>
                </div>
                <div class="form-group">
                    <label>Delivery / Meetup *</label>
                    <select id="deliveryMethod" required>
                        <option value="">Choose option</option>
                        <option value="meetup">Meetup (Daet, Camarines Norte - FREE)</option>
                        <option value="delivery">Delivery (₱50 fee)</option>
                    </select>
                </div>
                <div class="form-group" id="addressGroup" style="display: none;">
                    <label>Complete Address *</label>
                    <textarea id="address" placeholder="House #, Street, Barangay, City..." required></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3 class="section-title">Order Summary</h3>
                <div class="order-summary">
                    <div id="orderItems"></div>
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span id="subtotal">₱0.00</span>
                    </div>
                    <div class="summary-item" id="deliveryFeeRow" style="display: none;">
                        <span>Delivery Fee:</span>
                        <span>₱50</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total:</span>
                        <span id="grandTotal">₱0.00</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Place Order</button>
        </form>

        <div id="successMessage" class="success-message">
            <h3 style="color: #3d0026;; font-family: 'Times New Roman'; margin-bottom: 15px;">Order Confirmed!</h3>
            <p style="font-size: 18px; color: #3d0026;">Thank you! We'll update you soon. Mystic Charms ♥</p>
            <p style="margin-top: 20px;">
                <a href="index.html" style="color: #d63384; text-decoration: none; font-weight: bold;"> <u>🡰 Continue Shopping!</u></a>
            </p>
            <div style="margin-top: 30px;">
                <a href="orders.html"
                   style="display: inline-block; padding: 15px 30px; background: #3d0026; color: white; border: none; border-radius: 25px; font-size: 16px; font-family: 'Times New Roman'; cursor: pointer; text-decoration: none;">
                    View My Orders
                </a>
            </div>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCDNdTMCcFZEts9nYT0ILUeN_v7YY09380",
    authDomain: "mywebsite-829b5.firebaseapp.com",
    projectId: "mywebsite-829b5",
    storageBucket: "mywebsite-829b5.appspot.com",
    messagingSenderId: "322237844842",
    appId: "1:322237844842:web:eee18bf1c0f08fd748a913",
    databaseURL: "https://mywebsite-829b5-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let checkoutItems = [];
let subtotal = 0;

function formatAmount(value) {
    return `₱${Number(value).toFixed(2)}`;
}

async function initCheckout() {
    try {
        const session = JSON.parse(localStorage.getItem("userLogin"));

        if (!session) {
            alert("Please login first.");
            window.location.href = "login.html";
            return;
        }

        // FIND USER (SAFE)
        const usersSnap = await get(ref(db, "users"));
        if (!usersSnap.exists()) {
            alert("No users found.");
            return;
        }

        const users = Object.values(usersSnap.val());

        currentUser = users.find(u =>
            (session.email && u.email === session.email) ||
            (session.mobile && u.mobile === session.mobile)
        );

        if (!currentUser) {
            alert("Account not found. Please login again.");
            localStorage.removeItem("userLogin");
            window.location.href = "login.html";
            return;
        }

        // AUTO FILL
        document.getElementById("customerName").value = currentUser.fullname || "";
        document.getElementById("phoneNumber").value = currentUser.mobile || "";
        document.getElementById("customerEmail").value = currentUser.email || "";

        // PRODUCTS
        const products = {
            "001": { name: "Pink & Pearl Bracelet", price: 75 },
            "002": { name: "Pink & Pearl Bracelet", price: 75 },
            "003": { name: "Blue & Pearl Bracelet", price: 75 },
            "004": { name: "Blue & Pearl Bracelet", price: 75 },
            "005": { name: "Blue & Pearl Bracelet", price: 75 },
            "006": { name: "Blue & Pearl Bracelet", price: 75 },
            "007": { name: "Blue & Pearl Bracelet", price: 75 },
            "008": { name: "Blue & Pearl Bracelet", price: 75 },
            "009": { name: "Blue & Pearl Bracelet", price: 75 },
            "010": { name: "Pink & Pearl Keychain", price: 75 },
            "011": { name: "Blue & Pearl Keychain", price: 75 },
            "012": { name: "Gold & Pearl Keychain", price: 75 },
            "013": { name: "Gold & Pearl Keychain", price: 75 }
        };

        const direct = JSON.parse(localStorage.getItem("directCheckoutProduct"));
        
        // Check if user is logged in for cart access
        const userLogin = JSON.parse(localStorage.getItem("userLogin"));
        let cart = [];
        if (userLogin) {
            const userId = userLogin.userId;
            const cartKey = `cart_${userId}`;
            cart = JSON.parse(localStorage.getItem(cartKey) || "[]");
        } else {
            cart = JSON.parse(localStorage.getItem("cart") || "[]"); // fallback for legacy
        }

        // Check checkout intent flags
        const checkoutFromCart = localStorage.getItem("checkoutFromCart");
        const checkoutFromDirect = localStorage.getItem("checkoutFromDirect");
        
        // Clear the flags
        localStorage.removeItem("checkoutFromCart");
        localStorage.removeItem("checkoutFromDirect");

        // Determine checkout items based on intent
        if (checkoutFromCart === "true") {
            // User clicked checkout from cart page
            checkoutItems = cart
                .filter(i => products[i.id])
                .map(item => ({
                    id: item.id,
                    name: products[item.id].name,
                    price: products[item.id].price,
                    quantity: item.quantity || 1
                }));
        } else if (checkoutFromDirect === "true" && direct?.id && products[direct.id]) {
            // User clicked direct checkout button
            checkoutItems = [{
                id: direct.id,
                name: products[direct.id].name,
                price: products[direct.id].price,
                quantity: direct.quantity || 1
            }];
        } else {
            // Fallback: try cart first, then direct checkout
            if (cart.length > 0) {
                checkoutItems = cart
                    .filter(i => products[i.id])
                    .map(item => ({
                        id: item.id,
                        name: products[item.id].name,
                        price: products[item.id].price,
                        quantity: item.quantity || 1
                    }));
            } else if (direct?.id && products[direct.id]) {
                checkoutItems = [{
                    id: direct.id,
                    name: products[direct.id].name,
                    price: products[direct.id].price,
                    quantity: direct.quantity || 1
                }];
            } else {
                checkoutItems = [];
            }
        }

        renderOrder();

    } catch (err) {
        console.error(err);
        alert("Error loading checkout.");
    }
}

function renderOrder() {
    const container = document.getElementById("orderItems");
    container.innerHTML = "";
    subtotal = 0;

    if (checkoutItems.length === 0) {
        container.innerHTML = "<p>No items selected.</p>";
        document.querySelector(".submit-btn").disabled = true;
        return;
    }

    checkoutItems.forEach(item => {
        const total = item.price * item.quantity;
        subtotal += total;

        container.innerHTML += `
            <div class="checkout-item">
                <div>
                    <strong>${item.name}</strong><br>
                    Qty: ${item.quantity} × ${formatAmount(item.price)}
                </div>
                <div>${formatAmount(total)}</div>
            </div>
        `;
    });

    document.getElementById("subtotal").textContent = formatAmount(subtotal);
    updateTotal();
}

function updateTotal() {
    const method = document.getElementById("deliveryMethod").value;
    const feeRow = document.getElementById("deliveryFeeRow");

    let total = subtotal;

    if (method === "delivery") {
        total += 50;
        feeRow.style.display = "flex";
    } else {
        feeRow.style.display = "none";
    }

    document.getElementById("grandTotal").textContent = formatAmount(total);
}

document.addEventListener("DOMContentLoaded", () => {

    initCheckout();

    document.getElementById("deliveryMethod").addEventListener("change", function () {
        const addressGroup = document.getElementById("addressGroup");
        const addressInput = document.getElementById("address");

        addressGroup.style.display = this.value === "delivery" ? "block" : "none";
        addressInput.required = this.value === "delivery";

        if (this.value !== "delivery") addressInput.value = "";

        updateTotal();
    });

    document.getElementById("checkoutForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        if (checkoutItems.length === 0) {
            alert("No items to checkout.");
            return;
        }

        const delivery = document.getElementById("deliveryMethod").value;
        const address = document.getElementById("address").value.trim();

        if (!delivery) return alert("Select delivery method.");
        if (delivery === "delivery" && !address) return alert("Enter address.");

        const session = JSON.parse(localStorage.getItem("userLogin"));

        // 🔥 SAFE USER ID (FIXED)
        const safeUserId = session?.userId || "guest";

        const orderId = "order_" + Date.now();

        const order = {
            id: orderId,
            userId: safeUserId,
            name: currentUser.fullname || "Unknown",
            phone: currentUser.mobile || "N/A",
            email: currentUser.email || "N/A",
            items: checkoutItems,
            delivery,
            address: delivery === "delivery" ? address : "",
            subtotal,
            total: subtotal + (delivery === "delivery" ? 50 : 0),
            status: "confirmed",
            date: new Date().toISOString()
        };

        try {
            await set(ref(db, "orders/" + orderId), order);

            localStorage.removeItem("cart");
            localStorage.removeItem("directCheckoutProduct");
            
            // Also clear user-specific cart if logged in
            const userLogin = JSON.parse(localStorage.getItem("userLogin"));
            if (userLogin) {
                const userId = userLogin.userId;
                const cartKey = `cart_${userId}`;
                localStorage.removeItem(cartKey);
            }

            document.getElementById("checkoutForm").style.display = "none";
            document.getElementById("successMessage").style.display = "block";

        } catch (error) {
            console.error("SAVE ERROR:", error);
            alert("ERROR: " + error.message);
        }
    });
});
</script>

</body>
</html>
