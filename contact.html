<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Mystic Charms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body { 
            background: linear-gradient(135deg, #fff1f7 0%, #f8e8f0 100%); 
            font-family: Arial; 
            color: #333;
        }

        nav {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 30%;
            vertical-align: middle;
        }
        
        .logo-nav {
            font-size: 25px;
            font-family: "Times New Roman";
            font-weight: bold;
            color: #d63384;
            margin-right: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
        }
        
        .nav-icons {
            display: flex;
            margin-right: 15px;
            gap: 17px;
        }

        .icon {
            width: 35px;
            height: 35px;
            cursor: pointer;
            object-fit: contain;
            margin-right: 1px;
        }

        .icon:hover {
            opacity: 0.7;
            transition: 0.2s ease-in-out;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
        }
        
        .nav-menu a {
            text-decoration: none;
            padding: 25px;
            color: #3d0026;
            font-size: 22px;
            font-family: "Times New Roman";
            font-weight: 500;
        }

        .nav-menu a:hover { color: #d63384; }

        .nav-settings-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        section {
            padding: 20px 50px 80px 50px;
            min-height: 100vh;
            scroll-margin-top: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 { 
            color: #3d0026; 
            font-size: 50px; 
            margin-bottom: 50px;
            text-align: center; 
            font-family: "Times New Roman"; 
            margin-top: 0;
        }

        .contactcard {
            background: #f9eee2;
            padding: 25px 20px;
            min-height: 300px;
            width: 600px;
            border-radius: 50px;
            margin: 50px auto 0;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: flex-start;
            box-shadow: 0 10px 50px rgba(229, 175, 165, 1);
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: "Times New Roman";
            font-size: 25px;
            line-height: 1.8;
        }

        .contact-logo {
            width: 40px;
            height: 40px;
            border-radius: 30%;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .contact-row a {
            text-decoration: none;
            color: #3d0026;
        }

        .contact-row a:hover {
            color: #d63384;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #d63384;
            color: white;
        }


        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            min-width: 200px;
            margin-top: 10px;
        }

        .dropdown-menu.show {
            display: flex;
            flex-direction: column;
        }

        .dropdown-menu a,
        .dropdown-menu button {
            padding: 12px 20px;
            text-decoration: none;
            color: #3d0026;
            font-family: "Times New Roman";
            font-size: 16px;
            border: none;
            background: none;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .dropdown-menu a:hover,
        .dropdown-menu button:hover {
            background: #f0f0f0;
            color: #d63384;
        }

        .logout-btn {
            color: #dc3545;
        }

        @media (max-width: 768px) {
            nav {
                padding: 12px 10px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .logo-nav {
                font-size: 18px;
                margin-right: 5px;
            }

            .logo-img {
                width: 32px;
                height: 32px;
            }

            .nav-menu {
                gap: 10px;
            }

            .nav-menu a {
                padding: 12px 8px;
                font-size: 14px;
            }

            .icon {
                width: 28px;
                height: 28px;
            }

            section {
                padding: 18px 15px 50px 15px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 20px;
            }

            .contactcard {
                width: 95%;
                padding: 16px;
                border-radius: 35px;
            }

            .contact-row {
                font-size: 14px;
                line-height: 1.5;
            }

            .contact-logo {
                width: 32px;
                height: 32px;
            }
        }

        @media (max-width: 600px) {
            nav {
                padding: 10px 8px;
                gap: 6px;
            }

            .logo-nav {
                font-size: 14px;
            }

            .logo-img {
                width: 28px;
                height: 28px;
            }

            .nav-menu {
                gap: 8px;
            }

            .nav-menu a {
                padding: 10px 6px;
                font-size: 11px;
            }

            .icon {
                width: 24px;
                height: 24px;
            }

            section {
                padding: 15px 12px 40px 12px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 15px;
            }

            .contactcard {
                width: 98%;
                padding: 13px;
                border-radius: 25px;
            }

            .contact-row {
                font-size: 11px;
                line-height: 1.4;
                gap: 6px;
            }

            .contact-logo {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu a {
                font-size: 10px;
                padding: 8px 5px;
            }

            h1 {
                font-size: 18px;
            }

            .contact-row {
                font-size: 10px;
            }

            .contact-logo {
                width: 26px;
                height: 26px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo-nav">
            <img src="image6.jpg" alt="Mystic Charms Logo" class="logo-img">
            Mystic Charms
        </div>
        
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#bracelets">Bracelets</a></li>
            <li><a href="index.html#keychain">Keychain</a></li>
        </ul>
        
        <div class="nav-icons">
            <a href="cart.html" title="View Cart">
            <img src="fav.jpg" class="icon" id="heartIcon" alt="Add to Carts"></a>

            <a href="orders.html" title="View Orders">
            <img src="orders.png" class="icon" id="orderIcon" alt="View orders"></a>

            <a href="settings.html" title="Settings">
            <img src="settings-icon.png" alt="Settings" class="icon"></a>

        </div>
    </nav>

    <section id="contact">
        <h1>Contact Us ♥︎</h1>
        <div class="contactcard">
            <div class="contact-row">
                <img src="image5.jpg" alt="Mystic Charms Logo" class="contact-logo">
                <a href="https://www.facebook.com/profile.php?id=61574566044941" target="_blank">MYSTIC CHARMS</a>
            </div>
            <div class="contact-row">
                <img src="image7.jpg" alt="Number logo" class="contact-logo">
                <span>09295371650</span>
            </div>
            
            <div class="contact-row">
                <img src="image9.jpg" alt="Email logo" class="contact-logo">
                <a href="mailto:mystic.charms001@gmail.com">
                <span>mystic.charms001@gmail.com</span>
                </a>
            </div>

            
            <div class="contact-row">
                <img src="image8.jpg" alt="Location logo" class="contact-logo">
                <span>Daet, Camarines Norte</span>
            </div>
        </div>
    </section>

    <footer>
        © 2026 Mystic Charms
    </footer>

    <script>
        function toggleUserMenu() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', function(event) {
            const userMenu = document.querySelector('.user-menu');
            if (userMenu && !userMenu.contains(event.target)) {
                document.getElementById('userDropdown').classList.remove('show');
            }
        });

        function logout() {
            localStorage.removeItem('userLogin');
            window.location.href = 'login.html';
        }

        function viewProfile(e) {
            e.preventDefault();
            const userLogin = JSON.parse(localStorage.getItem('userLogin'));
            if (userLogin) {
                alert(`Logged in as:\n\nID: ${userLogin.userId}\nType: ${userLogin.type}\nLogin Time: ${userLogin.loginTime}`);
            }
        }

        window.addEventListener('load', function() {
            const userLogin = JSON.parse(localStorage.getItem('userLogin'));
            if (userLogin) {
                const userId = userLogin.userId;
                const initial = userId.charAt(0).toUpperCase();
                document.getElementById('userInitial').textContent = initial;
                
                if (userLogin.type === 'email') {
                    const emailParts = userId.split('@');
                    document.getElementById('userName').textContent = emailParts[0];
                } else {
                    document.getElementById('userName').textContent = userId.substring(userId.length - 4);
                }
            }
        });
    </script>
</body>
</html>
